version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: jobconnect_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobconnect
    ports:
      - '5434:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
